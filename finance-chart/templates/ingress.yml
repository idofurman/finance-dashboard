apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finance-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - allexpense.me
        - www.allexpense.me
      secretName: allexpense-tls
  rules:
    - host: allexpense.me
      http:
        paths:
          - path: /api/parse-receipt
            pathType: Prefix
            backend:
              service:
                name: receipt-service
                port:
                  number: {{ .Values.receiptService.port }}
          - path: /api/exchange-rates
            pathType: Prefix
            backend:
              service:
                name: exchange-rate-service
                port:
                  number: {{ .Values.exchangeRateService.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - host: www.allexpense.me
      http:
        paths:
          - path: /api/parse-receipt
            pathType: Prefix
            backend:
              service:
                name: receipt-service
                port:
                  number: {{ .Values.receiptService.port }}
          - path: /api/exchange-rates
            pathType: Prefix
            backend:
              service:
                name: exchange-rate-service
                port:
                  number: {{ .Values.exchangeRateService.port }}
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
