apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-refresher
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-refresher
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-refresher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ecr-refresher
subjects:
  - kind: ServiceAccount
    name: ecr-refresher
    namespace: default
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ecr-credentials-refresh
spec:
  schedule: "0 */6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          serviceAccountName: ecr-refresher
          restartPolicy: OnFailure
          containers:
            - name: refresh
              image: amazon/aws-cli:latest
              env:
                - name: AWS_DEFAULT_REGION
                  value: us-east-1
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
                  REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
                  TOKEN=$(aws ecr get-login-password --region ${AWS_DEFAULT_REGION})
                  AUTH=$(echo -n "AWS:${TOKEN}" | base64 -w 0)
                  DOCKER_CONFIG=$(echo -n "{\"auths\":{\"${REGISTRY}\":{\"username\":\"AWS\",\"password\":\"${TOKEN}\",\"auth\":\"${AUTH}\"}}}" | base64 -w 0)

                  SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)

                  curl -sf -X PATCH \
                    -H "Authorization: Bearer ${SA_TOKEN}" \
                    -H "Content-Type: application/strategic-merge-patch+json" \
                    --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
                    "https://kubernetes.default.svc/api/v1/namespaces/default/secrets/ecr-credentials" \
                    -d "{\"data\":{\".dockerconfigjson\":\"${DOCKER_CONFIG}\"}}"

                  echo "ECR credentials refreshed at $(date)"
