apiVersion: apps/v1
kind: Deployment
metadata:
  name: exchange-rate-service
spec:
  selector:
    matchLabels:
      app: exchange-rate-service

  template:
    metadata:
      labels:
        app: exchange-rate-service
    spec:
      containers:
        - name: exchange-rate-service
          image: {{ .Values.exchangeRateService.image.repository }}:{{ .Values.exchangeRateService.image.tag }}
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.exchangeRateService.port }}
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.exchangeRateService.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.exchangeRateService.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: finance-secrets
                  key: jwt-secret
            - name: ALLOWED_ORIGINS
              value: "https://allexpense.me,https://www.allexpense.me"
