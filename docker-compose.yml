services: 
  backend:
    build: ./backend
    ports:
      - "5000:5000"  
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://admin:secret@db:5432/finance     
      
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: finance      
