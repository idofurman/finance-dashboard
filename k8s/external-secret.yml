apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: finance-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: finance-secrets
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: finance/jwt-secret
    - secretKey: anthropic-api-key
      remoteRef:
        key: finance/anthropic-api-key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-credentials
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-credentials
    creationPolicy: Owner
  data:
    - secretKey: database-url
      remoteRef:
        key: finance/database-url
    - secretKey: db-user
      remoteRef:
        key: finance/db-user
    - secretKey: db-password
      remoteRef:
        key: finance/db-password
    - secretKey: db-name
      remoteRef:
        key: finance/db-name
