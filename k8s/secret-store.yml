apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-eso-credentials
            key: access-key-id
            namespace: default
          secretAccessKeySecretRef:
            name: aws-eso-credentials
            key: secret-access-key
            namespace: default
