name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run tests
        env:
          JWT_SECRET: test-secret-for-ci-only
        run: pytest backend/test_app.py -v

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Login to AWS ECR
        id: login-ecr
        uses: ./.github/actions/aws-ecr-login
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/finance-backend:$IMAGE_TAG -f backend/Dockerfile ./backend
          docker push $ECR_REGISTRY/finance-backend:$IMAGE_TAG

  build-exchange-rate-service:
    name: Build & Push Exchange Rate Service
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Login to AWS ECR
        id: login-ecr
        uses: ./.github/actions/aws-ecr-login
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Build and push exchange-rate-service image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/finance-exchange-rate-service:$IMAGE_TAG -f exchange-rate-service/Dockerfile ./exchange-rate-service
          docker push $ECR_REGISTRY/finance-exchange-rate-service:$IMAGE_TAG

  build-receipt-service:
    name: Build & Push Receipt Service
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Login to AWS ECR
        id: login-ecr
        uses: ./.github/actions/aws-ecr-login
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Build and push receipt-service image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/finance-receipt-service:$IMAGE_TAG -f receipt-service/Dockerfile ./receipt-service
          docker push $ECR_REGISTRY/finance-receipt-service:$IMAGE_TAG

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Login to AWS ECR
        id: login-ecr
        uses: ./.github/actions/aws-ecr-login
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Build and push frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/finance-frontend:$IMAGE_TAG -f frontend/Dockerfile ./frontend
          docker push $ECR_REGISTRY/finance-frontend:$IMAGE_TAG

  scan-backend:
    name: Security Scan Backend (Trivy)
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4

      - name: Login to AWS ECR
        id: login-ecr
        uses: ./.github/actions/aws-ecr-login
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/finance-backend:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

  scan-exchange-rate-service:
    name: Security Scan Exchange Rate Service (Trivy)
    runs-on: ubuntu-latest
    needs: build-exchange-rate-service
    steps:
      - uses: actions/checkout@v4

      - name: Login to AWS ECR
        id: login-ecr
        uses: ./.github/actions/aws-ecr-login
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/finance-exchange-rate-service:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

  scan-receipt-service:
    name: Security Scan Receipt Service (Trivy)
    runs-on: ubuntu-latest
    needs: build-receipt-service
    steps:
      - uses: actions/checkout@v4

      - name: Login to AWS ECR
        id: login-ecr
        uses: ./.github/actions/aws-ecr-login
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/finance-receipt-service:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

  scan-frontend:
    name: Security Scan Frontend (Trivy)
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Login to AWS ECR
        id: login-ecr
        uses: ./.github/actions/aws-ecr-login
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/finance-frontend:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

  deploy:
    name: Deploy to EKS
    needs: [scan-backend, scan-frontend, scan-receipt-service, scan-exchange-rate-service]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to AWS ECR
        id: login-ecr
        uses: ./.github/actions/aws-ecr-login
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig --name finance-eks --region us-east-1

      - name: Patch ArgoCD with new image tags
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          kubectl patch application finance-dashboard -n argocd \
            --type merge \
            -p "{\"spec\":{\"source\":{\"helm\":{\"parameters\":[
              {\"name\":\"backend.image.repository\",\"value\":\"${ECR_REGISTRY}/finance-backend\"},
              {\"name\":\"backend.image.tag\",\"value\":\"${IMAGE_TAG}\"},
              {\"name\":\"frontend.image.repository\",\"value\":\"${ECR_REGISTRY}/finance-frontend\"},
              {\"name\":\"frontend.image.tag\",\"value\":\"${IMAGE_TAG}\"},
              {\"name\":\"receiptService.image.repository\",\"value\":\"${ECR_REGISTRY}/finance-receipt-service\"},
              {\"name\":\"receiptService.image.tag\",\"value\":\"${IMAGE_TAG}\"},
              {\"name\":\"exchangeRateService.image.repository\",\"value\":\"${ECR_REGISTRY}/finance-exchange-rate-service\"},
              {\"name\":\"exchangeRateService.image.tag\",\"value\":\"${IMAGE_TAG}\"}
            ]}}}}"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n default --timeout=180s
          kubectl rollout status deployment/frontend -n default --timeout=180s
          kubectl rollout status deployment/receipt-service -n default --timeout=180s
          kubectl rollout status deployment/exchange-rate-service -n default --timeout=180s
