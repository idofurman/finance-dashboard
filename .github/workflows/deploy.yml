name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run tests
        run: pytest backend/test_app.py -v

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/finance-backend:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/finance-backend:$IMAGE_TAG
          docker tag $ECR_REGISTRY/finance-backend:$IMAGE_TAG $ECR_REGISTRY/finance-backend:latest
          docker push $ECR_REGISTRY/finance-backend:latest

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/finance-backend:latest
          format: table
          exit-code: 1
          severity: CRITICAL

  deploy:
    name: Deploy to EC2
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - uses: actions/checkout@v4

      - name: Copy Helm chart to EC2
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r ./finance-chart ubuntu@${{ secrets.EC2_HOST }}:~/

      - name: Deploy to EC2 via SSH
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} bash << EOF
            TOKEN=\$(aws ecr get-login-password --region us-east-1)
            sudo k3s kubectl create secret docker-registry ecr-credentials \
              --docker-server=${ECR_REGISTRY} \
              --docker-username=AWS \
              --docker-password=\$TOKEN \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            helm upgrade --install finance ~/finance-chart \
              --kubeconfig ~/.kube/config \
              --set backend.image.repository=${ECR_REGISTRY}/finance-backend \
              --set backend.image.tag=latest

            sudo k3s kubectl rollout status deployment/backend --timeout=180s
          EOF
