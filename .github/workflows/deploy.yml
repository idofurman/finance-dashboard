name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run tests
        env:
          JWT_SECRET: test-secret-for-ci-only
        run: pytest backend/test_app.py -v

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Login to AWS ECR
        id: login-ecr
        uses: ./.github/actions/aws-ecr-login
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Build and push Docker images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/finance-backend:$IMAGE_TAG -f backend/Dockerfile .
          docker push $ECR_REGISTRY/finance-backend:$IMAGE_TAG
          docker tag $ECR_REGISTRY/finance-backend:$IMAGE_TAG $ECR_REGISTRY/finance-backend:latest
          docker push $ECR_REGISTRY/finance-backend:latest

          docker build -t $ECR_REGISTRY/finance-frontend:$IMAGE_TAG -f frontend/Dockerfile ./frontend
          docker push $ECR_REGISTRY/finance-frontend:$IMAGE_TAG
          docker tag $ECR_REGISTRY/finance-frontend:$IMAGE_TAG $ECR_REGISTRY/finance-frontend:latest
          docker push $ECR_REGISTRY/finance-frontend:latest

  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:

      - name: Login to AWS ECR
        id: login-ecr
        uses: ./.github/actions/aws-ecr-login
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/finance-backend:latest
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

  deploy:
    name: Deploy to EC2
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - uses: actions/checkout@v4

      - name: Copy Helm chart to EC2
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r ./finance-chart ubuntu@${{ secrets.EC2_HOST }}:~/

      - name: Deploy to EC2 via SSH
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@${{ secrets.EC2_HOST }} bash << EOF
            set -e
            ACCOUNT_ID=\$(aws sts get-caller-identity --query Account --output text)
            ECR_REGISTRY="\${ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com"

            TOKEN=\$(aws ecr get-login-password --region us-east-1)
            sudo k3s kubectl create secret docker-registry ecr-credentials \
              --docker-server=\${ECR_REGISTRY} \
              --docker-username=AWS \
              --docker-password=\$TOKEN \
              --dry-run=client -o yaml | sudo k3s kubectl apply -f -

            # Tell ArgoCD which image tag to use — ArgoCD owns the deployment
            sudo k3s kubectl patch application finance-dashboard -n argocd \
              --type merge \
              -p "{\"spec\":{\"source\":{\"helm\":{\"parameters\":[{\"name\":\"backend.image.repository\",\"value\":\"\${ECR_REGISTRY}/finance-backend\"},{\"name\":\"backend.image.tag\",\"value\":\"${IMAGE_TAG}\"},{\"name\":\"frontend.image.repository\",\"value\":\"\${ECR_REGISTRY}/finance-frontend\"},{\"name\":\"frontend.image.tag\",\"value\":\"${IMAGE_TAG}\"}]}}}}"

            # Wait for ArgoCD to sync and rollout to complete
            sleep 15
            sudo k3s kubectl rollout status deployment/backend --timeout=180s
          EOF
